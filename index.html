<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - Empresa X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <header>
            <h1>Task<span>Flow</span></h1>
            <p id="data-atual"></p>
        </header>

        <section id="entrada-tarefa">
            <form id="form-tarefa">
                <input type="text" id="titulo" placeholder="O que precisa ser feito?" required maxlength="50">
                <textarea id="descricao" placeholder="Adicione detalhes (opcional)..." rows="2"></textarea>
                
                <div class="controls">
                    <select id="prioridade" required>
                        <option value="1">🔴 Crítico</option>
                        <option value="2">🟠 Alto</option>
                        <option value="3">🔵 Médio</option>
                        <option value="4" selected>🟢 Baixo</option>
                    </select>

                    <select id="periodo">
                        <option value="diario">Diário</option>
                        <option value="semanal">Semanal</option>
                        <option value="mensal">Mensal</option>
                        <option value="anual">Anual</option>
                    </select>

                    <button type="submit" id="btn-adicionar">Criar Task</button>
                </div>
            </form>
        </section>

        <nav class="tabs">
            <button class="tab-btn active" data-filter="todas">Todas</button>
            <button class="tab-btn" data-filter="andamento">Pendentes</button>
            <button class="tab-btn" data-filter="finalizadas">Concluídas</button>
        </nav>

        <section id="lista-container">
            <ul id="lista-tarefas"></ul>
            <div id="empty-state" class="hidden">
                <p>🎉 Nenhuma tarefa por aqui!</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
