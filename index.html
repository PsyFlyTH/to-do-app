<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo Empresa X - Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <header>
            <h1>Empresa X <span>| Task Flow</span></h1>
        </header>

        <section id="entrada-tarefa">
            <form id="form-tarefa">
                <div class="input-group">
                    <input type="text" id="titulo" placeholder="Título da tarefa" required>
                    <textarea id="descricao" placeholder="Descrição detalhada do que precisa ser feito..."></textarea>
                </div>
                
                <div class="controls">
                    <select id="prioridade" required>
                        <option value="" disabled selected>Prioridade</option>
                        <option value="1">Nível 1 (Crítico)</option>
                        <option value="2">Nível 2 (Alto)</option>
                        <option value="3">Nível 3 (Médio)</option>
                        <option value="4">Nível 4 (Baixo)</option>
                    </select>

                    <select id="periodo" required>
                        <option value="" disabled selected>Prazo</option>
                        <option value="diario">Diário</option>
                        <option value="semanal">Semanal</option>
                        <option value="mensal">Mensal</option>
                        <option value="anual">Anual</option>
                    </select>

                    <button type="submit" id="btn-adicionar">Adicionar Tarefa</button>
                </div>
            </form>
        </section>

        <hr>

        <section id="lista-container">
            <div class="stats">
                <span>Tarefas Ativas: <strong id="contador">0</strong></span>
            </div>
            <ul id="lista-tarefas">
                </ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
